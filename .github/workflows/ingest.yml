name: Ingest

on:
  # Asks for hourly, but GitHub schedules are best-effort and get dropped under
  # load: measured 2026-07-04..07-13 this fired 7-16×/day, never 24. Worker
  # volume is light (≤2 new tweets/hr typical) so it still keeps up. Actions
  # minutes are not a constraint here — this repo is public, and public repos
  # get unmetered Actions on standard runners. If punctuality ever matters,
  # drive workflow_dispatch from an external cron instead of tightening this
  # schedule — GitHub drops tightened schedules too.
  schedule:
    - cron: "0 * * * *"
  # Manual trigger for testing without waiting for the next hour.
  workflow_dispatch:

# Cancel in-flight runs if a new one starts (e.g. manual + scheduled overlap)
# so we never have two ingest workers racing on the same Supabase rows.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup reads the pnpm version from package.json's
      # "packageManager" field; runs before setup-node so cache: pnpm works.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch RSS sources
        run: pnpm run fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Translate untranslated Japanese posts
        run: pnpm run translate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
